<style>
html,body {
	margin: 0;
	padding: 0;
	border: 0;
	font: inherit;
	vertical-align: baseline;
	list-style-type: none;
	list-style: none;
	text-shadow:
		0px 0px 6px #000,
		0px 0px 6px #000,
		0px 0px 6px #000;
	font-family: Comic Sans MS;
	color: white;
	scrollbar-width: none; 
    -ms-overflow-style: none;
}
html{
	background-color: black;
}
#enterOverlay {
	position: fixed;
	top: 0;
	left: 0;
	width: 100%;
	height: 100%;
	background: rgba(0,0,0,0.5);
	font-size: 512;
	color: red;
	display: flex;
	justify-content: center;
	align-items: center;
	z-index: 9999;
	cursor: pointer;
	backdrop-filter: blur(20px);
	-webkit-backdrop-filter: blur(20px);
}
.main-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
	flex-direction: column;
	height: 100vh;
}

#tabs-container {
    border: none;
	border: 2px solid red;
	border-radius: 12px;
	background: rgba(85,0,0,0.5);
	backdrop-filter: blur(10px);
	-webkit-backdrop-filter: blur(10px);
}

.slider-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
}

.tab-slider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 25px;
	width: 100%;
}

.tab-display {
    flex-grow: 1;
    text-align: center;
    font-size: 26px;
    font-weight: bold;
    color: red;
    user-select: none;
}

.arrow {
    background: none;
    color: red;
    font-size: 32px;
    cursor: pointer;
    transition: transform 0.2s, color 0.2s;
    padding: 0 10px;
	width: 100%;
	border-radius: 25%;
	border: 0;
	padding: 6px;
}

.arrow:hover {
    transform: scale(1.25);
}
.content-area {
	border-radius: 10px;
}

/*          HOME          */
#home {
    display: flex;
}

#discord-profile {
    display: flex;
    flex-direction: column;
	border-top: 2px solid red;
	border-right: 2px solid red;
}

#discord-header {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 8px;
	border-bottom: 2px solid red;
	padding: 6px;
}

.avatar-wrapper {
    position: relative;
    width: 48px;
    height: 48px;
    flex-shrink: 0;
}

#discord-avatar {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    display: block;
}

#status {
    position: absolute;
    bottom: 0;
    right: 0;
    font-size: 12px;
}

.identity-info {
    display: flex;
    flex-direction: column;
    justify-content: center;
	white-space: nowrap;
}

.name-line {
    display: flex;
    align-items: center;
    gap: 4px;
	white-space: nowrap;
}

#discord-tag {
    font-size: 12px;
    border-radius: 20%;
    background: rgba(85, 85, 85, 0.5);
    padding: 2px 5px;
    text-shadow: none;
	white-space: nowrap;
}

#about-me {
	display: flex;
    font-size: 14px;
    line-height: 1.5;
	padding: 2px;
	height: 100%;
	align-items: center;
}

#activities-list {
    font-size: 16px;
	text-align: left;
	width: 100%;
	border-top: 2px solid red;
}

.activity {
	padding: 0 6px;
	border-bottom: 2px dashed rgba(255,0,0,0.5);
	border-top: 2px dashed rgba(255,0,0,0.5);
	margin: -2px;
}

.activity-details {
	font-size: 12px;
	color: #888;
	white-space: nowrap;
	padding-bottom: 4px;
}
/*          HOME          */

/*         SOCIALS        */

/*         LINKS        */

.link-item {

	padding-right: 40px;
}

.link-icon {

	border-radius: 25%;

}
/*         LINKS        */

/*         PROFILES        */

.profile-item {

.profile-name {
	left: 0;
    font-size: 24px;
	padding-right: 40px;
}

.profile-icon {
	right: 0;
    height: 38px;
}
/*         PROFILES        */

#bg {
	position: fixed;
	top: 0;
	left: 0;
	width: 100%;
	height: 100%;
	object-fit: cover;
	z-index: -1;
	filter: blur(4px);
	overflow: hidden;
}
.banner {
	display: flex;
	padding-bottom: 16px;
}

/* YOUTUBE MUSIC PLAYER CUSTOM EMBED */

.ytm-player {
	display: flex;
	gap: 10px;
	background: #0f0f0f;
	color: white;
	margin: 0;
	padding: 10px;
	border-bottom-right-radius: 12px;
	border-bottom-left-radius: 12px;
	border-top: 2px solid red;
	max-width: 100%;
    align-items: flex-start;
}

.ytm-player__thumb {
	width: 50px;
	height: 50px;
	border-radius: 8px;
	object-fit: cover;
	flex-shrink: 0;
}

.ytm-player__info {
	display: flex;
	flex-direction: column;
	overflow: hidden;
	flex-grow: 1;
	min-width: 0;
}

.ytm-player__title {
	font-size: 14px;
	font-weight: bold;
	white-space: nowrap;
	overflow: hidden;
}

.ytm-player__artist {
	font-size: 12px;
	color: #aaa;
}

.ytm-player__progress {
	height: 6px;
	background: #333;
	margin-top: 6px;
	border-radius: 2px;
	overflow: hidden;
}

.ytm-player__progress-fill {
	height: 100%;
	width: 0%;
	background: #ff0000;
}

.ytm-player__volume-wrapper {
    display: flex;
	align-items: center;
    justify-content: center;
    width: 10px;
	height: 50px;
	margin: 0;
	padding: 0;
	bottom: 0;
}

.vertical-slider {
    width: 64px; /* This becomes the 'height' once rotated */
    height: 4px;
    background: #0000;
    transform: rotate(-90deg);
    cursor: pointer;
    accent-color: red;
}

.vertical-slider::-webkit-slider-thumb {
    height: 6px;
    width: 6px;
    background: red;
    border-radius: 50%;
}

#views {

	background: rgba(128,85,85,0.25);

	padding: 6px;
	backdrop-filter: blur(100px);
	border: 2px solid red;
}
</style>

<script>
const tabs = ['home', 'socials', 'links', 'profiles'];
let currentTabIndex = 0;

function changeTab(direction) {
    currentTabIndex += direction;

    if (currentTabIndex < 0) currentTabIndex = tabs.length - 1;
    if (currentTabIndex >= tabs.length) currentTabIndex = 0;

    const newTabId = tabs[currentTabIndex];

    document.getElementById('current-tab-name').innerText = newTabId;

    showTab(newTabId);
}

function showTab(tabId) {
    const contents = document.querySelectorAll('.tab-content');
    contents.forEach(content => {
        content.style.display = 'none';
    });
    
    const activeTab = document.getElementById(tabId);
    if (!activeTab) return;

    if (tabId === 'home' || tabId === 'links' || tabId === 'socials') {
        activeTab.style.display = 'flex';
    } else if (tabId === 'profiles') {
        activeTab.style.display = 'grid';
    } else {
        activeTab.style.display = 'block';
    }
}
</script>
