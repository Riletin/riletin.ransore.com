<script>
const tabs = ['home', 'socials', 'links', 'profiles'];
let currentTabIndex = 0;

function changeTab(direction) {
    currentTabIndex += direction;

    if (currentTabIndex < 0) currentTabIndex = tabs.length - 1;
    if (currentTabIndex >= tabs.length) currentTabIndex = 0;

    const newTabId = tabs[currentTabIndex];

    document.getElementById('current-tab-name').innerText = newTabId;

    showTab(newTabId);
}

function showTab(tabId) {
    const contents = document.querySelectorAll('.tab-content');
    contents.forEach(content => {
        content.style.display = 'none';
    });
    
    const activeTab = document.getElementById(tabId);
    if (!activeTab) return;

    if (tabId === 'home' || tabId === 'links' || tabId === 'socials') {
        activeTab.style.display = 'flex';
    } else if (tabId === 'profiles') {
        activeTab.style.display = 'grid';
    } else {
        activeTab.style.display = 'block';
    }
}
</script>
